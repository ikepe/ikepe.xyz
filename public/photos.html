<!DOCTYPE html>
<html>

<head>
  <meta charset="uff-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <!--favicon-->
  <link rel="icon" href="icon/favicon.ico" sizes="128*128">
  <!--CSS-->
  <link rel="stylesheet" href="css/button.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/photos.css">
  <link href="https://fonts.googleapis.com/css?family=Noto+Sans+JP" rel="stylesheet">
  <title>いけぺ～のホームページ</title>
  <link rel=”alternate” media=”only screen and (max-width: 640px)” href=”http://www.ikepe.xyz/s/” />
  <!--JQuery-->
  <script src="//code.jquery.com/jquery-2.2.4.min.js"></script>
  <!--JS-->
  <script>
    $(function () {
      $("#header").load("header.html");
      $("#footer").load("footer.html");
    });
  </script>
</head>

<body>
  <div id="header"></div>
  <div class="photo-box">
    <div class="photo-block">
      <img src="photos/200928.jpg" class="photo">
      <img src="photos/201206.jpg" class="photo">
      <img src="photos/201212.jpg" class="photo">
      <img src="photos/201219.jpg" class="photo">
      <img src="photos/210101.jpg" class="photo">
      <img src="photos/210208.jpg" class="photo">
      <img src="photos/210226.jpg" class="photo">
      <img src="photos/210407.jpg" class="photo">
    </div>
  </div>

  <!-- Google翻訳フローティングボタン -->
  <div id="translate-container">
    <div id="google_translate_element"></div>
    <button id="translate-btn" onclick="toggleTranslate()" title="翻訳 / Translate">🌐</button>
  </div>
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'ja',
        includedLanguages: 'en,zh-CN,zh-TW,ko,fr,de,es',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
    function toggleTranslate() {
      document.getElementById('google_translate_element').classList.toggle('active');
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>

</html>
